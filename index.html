<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Preview</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

.player{
    position:relative;
    width:90%;
    max-width:720px;
}

video{
    width:100%;
    border-radius:12px;
}

.playBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.7);
    color:#fff;
    border:none;
    padding:15px 25px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="player">

    <video id="videoPlayer" controls preload="none">
        <source src="https://cdn.videy.co/sUjed82q1.mp4" type="video/mp4">
    </video>

    <button class="playBtn" onclick="startVideo()">▶ Play Video</button>

</div>

<script>
function startVideo(){

    // IKLAN DIRECT LINK
    window.open("https://suszhi.com/2100066","_blank");

    // play video
    document.querySelector(".playBtn").style.display="none";
    document.getElementById("videoPlayer").play();
}
</script>

</body>
</html>
