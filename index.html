<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body{
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
}

.player{
  position:relative;
  max-width:420px;
  width:100%;
}

video{
  width:100%;
  border-radius:12px;
}

.playbtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  background:rgba(255,255,255,0.9);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:32px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="player">

<video id="video">
  <source src="https://cdn.videy.co/sUjed82q1.mp4" type="video/mp4">
</video>

<div class="playbtn" id="playBtn">▶</div>

</div>

<script>
let adsShown = false;

document.getElementById("playBtn").addEventListener("click", function(){

  // buka iklan hanya sekali
  if(!adsShown){
    window.open("https://souszhi.com/2100066/","_blank");
    adsShown = true;
  }

  const video = document.getElementById("video");
  video.play();

  this.style.display = "none";
});
</script>

</body>
    </html>
