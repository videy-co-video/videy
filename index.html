<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

video{
    width:100%;
    max-width:720px;
    background:#000;
}
</style>
</head>

<body>

<video id="videoPlayer" controls playsinline>
    <source src="https://cdn.videy.co/sUjed82q1.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("videoPlayer");

// cek apakah iklan sudah pernah dibuka
let adOpened = sessionStorage.getItem("adOpened");

video.addEventListener("click", function () {

    if(!adOpened){
        sessionStorage.setItem("adOpened", "yes");
        adOpened = true;

        // buka iklan HANYA SEKALI
        window.open("https://suszhi.com/2100066", "_blank");
    }

});
</script>

</body>
    </html>
