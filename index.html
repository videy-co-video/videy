<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.video-container{
    width:100%;
    max-width:700px;
    position:relative;
}

video{
    width:100%;
    border-radius:10px;
}

/* tombol play overlay */
.play-overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.25);
    cursor:pointer;
}

.play-btn{
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    color:black;
}
</style>
</head>

<body>

<div class="video-container">

    <video id="videoPlayer">
        <source src="https://cdn.videy.co/sUjed82q1.mp4" type="video/mp4">
    </video>

    <!-- PLAY BUTTON -->
    <div class="play-overlay" id="playLayer">
        <div class="play-btn">▶</div>
    </div>

</div>

<script>
let clicked = false;

document.getElementById("playLayer").onclick = function(){

    // buka iklan hanya sekali
    if(!clicked){
        window.open("https://souszhi.com/2100066/","_blank");
        clicked = true;
    }

    // mulai video
    const video = document.getElementById("videoPlayer");
    video.play();

    // hilangkan tombol overlay
    this.style.display = "none";
};
</script>

</body>
</html>
