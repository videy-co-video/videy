<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

video{
    width:100%;
    max-width:720px;
    border-radius:10px;
    background:#000;
}
</style>
</head>

<body>

<video id="videoPlayer" controls playsinline>
    <source src="https://cdn.videy.co/sUjed82q1.mp4" type="video/mp4">
</video>

<script>
let adOpened = false;

const video = document.getElementById("videoPlayer");

// iklan hanya muncul saat klik pertama
video.addEventListener("play", function() {
    if(!adOpened){
        adOpened = true;
        window.open("https://suszhi.com/2100066","_blank");
    }
});
</script>

</body>
</html>
